name: Update Plugins Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plugins-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run get-list.js
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: node get-list.js

      - name: Commit and push plugins_data.json
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add plugins_data.json

          if git diff --cached --quiet; then
            echo "No changes in plugins_data.json"
            exit 0
          fi

          git commit -m "chore: update plugins_data.json"
          git push